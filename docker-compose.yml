version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: cp_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cpuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cppassword}
      POSTGRES_DB: ${POSTGRES_DB:-constituency_pulse}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cpuser} -d ${POSTGRES_DB:-constituency_pulse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cp_unified_web
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cpuser}:${POSTGRES_PASSWORD:-cppassword}@db:5432/${POSTGRES_DB:-constituency_pulse}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGINS: "*"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
